<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" th:href="@{/css/equipe.css}">
        <title>Document</title>
    </head>
    <body>
        <div class="sidebar">
            <ul>
                <li><a th:href="@{/equipe}">Equipe</a></li>
                <li><a th:href="@{/tarefas}">Tarefas</a></li>
                <li><a th:href="@{/usuario}">Usuário</a></li>
            </ul>
            <!-- Imagem ou ícone ao final do sidebar como link para a página de login -->
            <a th:href="@{/usuario/login}"><img src="img/user.png" alt="Logo"></a>
        </div>
        <main class="container">
            <h1>Equipe</h1>
            <a href="/equipe/novo" class="btn btn-primary">Novo</a>
        
            <!-- Contêiner flexível para os cards -->
            <div class="card-container" id="tabusuarios">
                <div th:each="equipe : ${listaEquipes}" class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${equipe.nomeEquipe}">Nome da Equipe</h5>
                        <p class="card-text">
                            Pessoas:
                            <ul>
                                <li th:each="pessoa : ${equipe.pessoas}" th:text="${pessoa.nomeCompleto}"></li>
                            </ul>
                        </p>    

                        <button class="btn btn-info js-view" th:data-id="${equipe.id}" data-bs-toggle="modal" data-bs-target="#modalView">Consultar</button>
                        <button class="btn btn-danger js-delete" th:data-id="${equipe.id}">Excluir</button>
                    </div>
                </div>
            </div>
        </main>        
    </body>
</html>
