<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/equipeCadastro.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" th:href="@{/css/equipeCadastro.css}">
        <title>Document</title>
    </head>
    <body>
        <main class="container">
            <h1><Strong>Cadastro de Equipe</Strong></h1>
            <form th:action="@{/equipe/cadastrar}" method="post" th:object="${equipe}">
                <div class="form-group">
                    <label for="textnome">Nome da Equipe:</label>
                    <input type="text" class="form-control" id="textnome" placeholder="Nome da Equipe" th:field="*{nomeEquipe}">
                </div>
               <div class="form-group">
                <label>Pessoas:</label>
                <select class="form-select" th:field="*{pessoas}">
                    <option th:each="usuario : ${listaUsuarios}" th:text="${usuario.nomeCompleto}" th:value="${usuario.id}"></option>
                </select>
               </div>
               <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
             <div class="modal fade" id="usuariosModal" tabindex="-1" aria-labelledby="usuariosModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="usuariosModalLabel">Selecione as Pessoas</h5>
                        <!-- Button to close modal -->
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div th:each="usuario : ${listaUsuarios}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="${usuario.id}" id="usuario_${usuario.id}" th:data-usuario-id="${usuario.id}">
                                <label class="form-check-label" for="usuario_${usuario.id}">
                                    <span th:text="${usuario.nomeCompleto}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary" id="saveSelection">Salvar Seleção</button>
                    </div>
                </div>
            </div>
        </div>
        </main>
    </body>
</html>
