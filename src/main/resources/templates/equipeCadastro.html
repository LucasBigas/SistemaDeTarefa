<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/equipeCadastro.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
        <title>Cadastro de Equipe</title>
    </head>
    <body>
        <main class="container">
            <h1><strong>Cadastro de Equipe</strong></h1>
            <form th:action="@{/equipe/cadastrar}" method="post" th:object="${equipe}">
                <div class="form-group">
                    <label for="textnome">Nome da Equipe:</label>
                    <input type="text" class="form-control" id="textnome" placeholder="Nome da Equipe" th:field="*{nomeEquipe}">
                    <span class="error" th:if="${#fields.hasErrors('nomeEquipe')}" th:errors="*{nomeEquipe}"></span>
                </div>

                <!-- Select com múltiplas opções usando Select2 -->
                <div class="form-group mt-3">
                    <label for="idselect">Selecionar Pessoas:</label>
                    <select class="form-control2 select2" id="idselect" name="pessoasSelecionadas" multiple="multiple" th:field="*{pessoas}">
                        <optgroup label="Pessoas">
                            <option th:each="usuario : ${listaUsuarios}" th:value="${usuario.id}" th:text="${usuario.nomeCompleto}"></option>
                        </optgroup>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary mt-3">Enviar</button>
            </form>
        </main>

        <!-- Scripts -->
        <script src="https://code.jquery.com/jquery-3.7.0.js" integrity="sha256-JlqSTELeR4TLqP0OG9dxM7yDPqX1ox/HfgiSLBj8+kM=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

        <!-- Inicialização do Select2 -->
        <script>
            $(document).ready(function() {
                $(".select2").select2();
            });
        </script>
    </body>
</html>
