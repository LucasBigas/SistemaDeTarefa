<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/equipeCadastro.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" th:href="@{/css/equipeCadastro.css}">
        <title>Document</title>
    </head>
    <body>
        <main class="container">
            <h1><Strong>Cadastro de Equipe</Strong></h1>
            <form th:action="@{/equipe/cadastrar}" method="post" th:object="${equipe}">
                <div class="form-group">
                    <label for="textnome">Nome da Equipe:</label>
                    <input type="text" class="form-control" id="textnome" placeholder="Nome da Equipe" th:field="*{nomeEquipe}">
                    <span class="error" th:if="${#fields.hasErrors('nomeEquipe')}" th:errors="*{nomeEquipe}"></span>
                </div>
                <div class="form-group">
                    <label>Pessoas:</label>
                    <select class="form-select" multiple="multiple" th:field="*{pessoas}">
                        <option th:each="usuario : ${listaUsuarios}" th:text="${usuario.nomeCompleto}" th:value="${usuario.id}"></option>
                    </select>
               </div>
               <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </main>
    </body>
</html>
